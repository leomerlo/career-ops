<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>career-ops dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:       hsl(187, 74%, 32%);
    --teal-light: hsl(187, 40%, 95%);
    --teal-mid:   hsl(187, 40%, 88%);
    --purple:     hsl(270, 70%, 45%);
    --ink:        #1a1a2e;
    --muted:      #6b7280;
    --border:     #e5e7eb;
    --bg:         #f9fafb;
    --white:      #ffffff;
    --radius:     8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo-bar {
    width: 3px;
    height: 22px;
    background: linear-gradient(to bottom, var(--teal), var(--purple));
    border-radius: 2px;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }
  .header-refresh {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.15s, color 0.15s;
  }
  .header-refresh:hover { border-color: var(--teal); color: var(--teal); }

  /* ── Layout ── */
  .main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 14px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    min-width: 130px;
    flex: 1;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stat-card.accent .stat-value { color: var(--teal); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--white);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--teal); }

  .filter-select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--white);
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .filter-select:focus { border-color: var(--teal); }

  /* ── Table ── */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead { background: var(--bg); }
  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--teal); }
  th .sort-icon { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; color: var(--teal); }

  td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: hsl(187, 40%, 98%); }

  .col-num   { width: 50px; color: var(--muted); font-size: 12px; }
  .col-date  { width: 100px; color: var(--muted); font-size: 12px; white-space: nowrap; }
  .col-co    { font-weight: 600; color: var(--ink); }
  .col-role  { color: var(--ink); max-width: 240px; }
  .col-score { width: 70px; text-align: center; }
  .col-status { width: 120px; }
  .col-docs  { width: 130px; }
  .col-notes { color: var(--muted); font-size: 12px; max-width: 260px; }

  /* ── Score pill ── */
  .score {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 20px;
    min-width: 46px;
  }
  .score-high  { background: #dcfce7; color: #15803d; }
  .score-mid   { background: #fef9c3; color: #854d0e; }
  .score-low   { background: #fee2e2; color: #991b1b; }
  .score-none  { background: var(--border); color: var(--muted); }

  /* ── Status badge ── */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .badge-evaluated  { background: hsl(187,40%,92%); color: var(--teal); }
  .badge-applied    { background: hsl(270,40%,92%); color: var(--purple); }
  .badge-interview  { background: #dbeafe; color: #1d4ed8; }
  .badge-offer      { background: #dcfce7; color: #15803d; }
  .badge-rejected   { background: #fee2e2; color: #991b1b; }
  .badge-skip       { background: #f3f4f6; color: #6b7280; }
  .badge-discarded  { background: #f3f4f6; color: #6b7280; }
  .badge-responded  { background: #fef3c7; color: #92400e; }
  .badge-default    { background: #f3f4f6; color: #374151; }

  /* ── Doc links ── */
  .doc-links { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .doc-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    text-decoration: none;
    border: 1px solid var(--teal-mid);
    color: var(--teal);
    background: var(--teal-light);
    white-space: nowrap;
    transition: background 0.15s;
  }
  .doc-btn:hover { background: var(--teal-mid); }
  .doc-btn.report {
    border-color: hsl(270,40%,88%);
    color: var(--purple);
    background: hsl(270,40%,95%);
  }
  .doc-btn.report:hover { background: hsl(270,40%,88%); }
  .gen-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid #d1d5db;
    color: #374151;
    background: #f9fafb;
    white-space: nowrap;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .gen-btn:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .gen-btn.generating { border-color: var(--teal); color: var(--teal); }
  .gen-btn.done { border-color: #15803d; color: #15803d; background: #dcfce7; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 80px; color: var(--muted); }

  /* ── Notes truncate ── */
  .note-text {
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .col-notes { display: none; }
    .col-date  { display: none; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── Helpers ─────────────────────────────────────────────────────────────────

function scoreClass(n) {
  if (n === null) return 'score-none';
  if (n >= 4.0) return 'score-high';
  if (n >= 3.5) return 'score-mid';
  return 'score-low';
}

function badgeClass(status) {
  const s = (status || '').toLowerCase();
  if (s === 'evaluated') return 'badge-evaluated';
  if (s === 'applied')   return 'badge-applied';
  if (s === 'interview') return 'badge-interview';
  if (s === 'offer')     return 'badge-offer';
  if (s === 'rejected')  return 'badge-rejected';
  if (s === 'responded') return 'badge-responded';
  if (s === 'skip')      return 'badge-skip';
  if (s === 'discarded') return 'badge-discarded';
  return 'badge-default';
}

function statuses(apps) {
  const counts = {};
  for (const a of apps) {
    counts[a.status] = (counts[a.status] || 0) + 1;
  }
  return counts;
}

function avgScore(apps) {
  const scored = apps.filter(a => a.scoreNum !== null);
  if (!scored.length) return null;
  return (scored.reduce((s, a) => s + a.scoreNum, 0) / scored.length).toFixed(1);
}

// ── Components ───────────────────────────────────────────────────────────────

function StatCard({ value, label, accent }) {
  return (
    <div className={`stat-card${accent ? ' accent' : ''}`}>
      <div className="stat-value">{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

function ScorePill({ score, scoreNum }) {
  if (!score || score === '❌') return <span className="score score-none">—</span>;
  return (
    <span className={`score ${scoreClass(scoreNum)}`}>
      {scoreNum !== null ? scoreNum.toFixed(1) : score}
    </span>
  );
}

function StatusBadge({ status }) {
  return <span className={`badge ${badgeClass(status)}`}>{status}</span>;
}

function GenButton({ source, onDone }) {
  const [state, setState] = useState('idle'); // idle | generating | done | error

  async function generate() {
    setState('generating');
    try {
      const res = await fetch('/api/generate-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ htmlPath: source.htmlPath, pdfPath: source.pdfPath }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      setState('done');
      setTimeout(() => { setState('idle'); onDone(); }, 1500);
    } catch (err) {
      setState('error');
      setTimeout(() => setState('idle'), 3000);
    }
  }

  const label = source.pdfExists ? `↻ ${source.label}` : `⚡ ${source.label}`;
  const title = source.pdfExists
    ? `Regenerate ${source.pdfPath}`
    : `Generate PDF from ${source.htmlPath}`;

  if (state === 'generating') return <button className="gen-btn generating" disabled>⏳ {source.label}</button>;
  if (state === 'done')       return <button className="gen-btn done" disabled>✓ {source.label}</button>;
  if (state === 'error')      return <button className="gen-btn" style={{borderColor:'#991b1b',color:'#991b1b'}} onClick={generate}>✗ retry</button>;

  return <button className="gen-btn" title={title} onClick={generate}>{label}</button>;
}

function DocLinks({ pdfLinks, reportPath, reportLabel, htmlSources, onRefresh }) {
  return (
    <div className="doc-links">
      {pdfLinks.map((l, i) => (
        <a key={i} href={`/${l.href}?dl=1`} className="doc-btn" title={`Download ${l.href}`}>
          ↓ {l.label}
        </a>
      ))}
      {reportPath && (
        <a href={`/${reportPath}`} target="_blank" className="doc-btn report" title={reportPath}>
          ⊞ {reportLabel || 'Report'}
        </a>
      )}
      {(htmlSources || []).map((src, i) => (
        <GenButton key={i} source={src} onDone={onRefresh} />
      ))}
    </div>
  );
}

function SortIcon({ dir }) {
  if (!dir) return <span className="sort-icon">⇅</span>;
  return <span className="sort-icon">{dir === 'asc' ? '↑' : '↓'}</span>;
}

// ── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [apps, setApps]       = useState(null);
  const [search, setSearch]   = useState('');
  const [filterSt, setFilter] = useState('');
  const [sort, setSort]       = useState({ col: 'num', dir: 'desc' });

  async function load() {
    const res = await fetch('/api/apps');
    const data = await res.json();
    setApps(data);
  }

  useEffect(() => { load(); }, []);

  const allStatuses = useMemo(() => {
    if (!apps) return [];
    return [...new Set(apps.map(a => a.status))].sort();
  }, [apps]);

  const filtered = useMemo(() => {
    if (!apps) return [];
    let list = apps;
    if (filterSt) list = list.filter(a => a.status === filterSt);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(a =>
        a.company.toLowerCase().includes(q) ||
        a.role.toLowerCase().includes(q) ||
        (a.notes || '').toLowerCase().includes(q)
      );
    }
    list = [...list].sort((a, b) => {
      const dir = sort.dir === 'asc' ? 1 : -1;
      if (sort.col === 'num') {
        return dir * ((+a.num || 0) - (+b.num || 0));
      }
      if (sort.col === 'score') {
        return dir * ((a.scoreNum ?? -1) - (b.scoreNum ?? -1));
      }
      if (sort.col === 'date') {
        return dir * a.date.localeCompare(b.date);
      }
      if (sort.col === 'company') {
        return dir * a.company.localeCompare(b.company);
      }
      return 0;
    });
    return list;
  }, [apps, search, filterSt, sort]);

  function toggleSort(col) {
    setSort(s => s.col === col
      ? { col, dir: s.dir === 'desc' ? 'asc' : 'desc' }
      : { col, dir: 'desc' }
    );
  }

  function Th({ col, children }) {
    return (
      <th className={sort.col === col ? 'sorted' : ''} onClick={() => toggleSort(col)}>
        {children} <SortIcon dir={sort.col === col ? sort.dir : null} />
      </th>
    );
  }

  if (!apps) return <div className="loading">Loading applications...</div>;

  const counts = statuses(apps);
  const avg = avgScore(apps);
  const active = apps.filter(a => !['SKIP','Discarded','Rejected'].includes(a.status)).length;

  return (
    <>
      <header className="header">
        <div className="header-logo">
          <div className="header-logo-bar" />
          <div>
            <div className="header-title">career-ops</div>
            <div className="header-sub">Job Search Dashboard</div>
          </div>
        </div>
        <button className="header-refresh" onClick={load}>↻ Refresh</button>
      </header>

      <main className="main">
        {/* Stats */}
        <div className="stats">
          <StatCard value={apps.length} label="Total evaluated" />
          <StatCard value={active} label="Active pipeline" accent />
          <StatCard value={counts['Applied'] || 0} label="Applied" />
          <StatCard value={counts['Interview'] || 0} label="In interview" />
          <StatCard value={counts['Offer'] || 0} label="Offers" />
          <StatCard value={avg ?? '—'} label="Avg score" accent />
        </div>

        {/* Toolbar */}
        <div className="toolbar">
          <div className="search-wrap">
            <span className="search-icon">⌕</span>
            <input
              className="search-input"
              placeholder="Search company, role, notes..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
          </div>
          <select className="filter-select" value={filterSt} onChange={e => setFilter(e.target.value)}>
            <option value="">All statuses ({apps.length})</option>
            {allStatuses.map(s => (
              <option key={s} value={s}>{s} ({counts[s] || 0})</option>
            ))}
          </select>
        </div>

        {/* Table */}
        <div className="table-wrap">
          {filtered.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">📭</div>
              <div>No applications match your filters.</div>
            </div>
          ) : (
            <table>
              <thead>
                <tr>
                  <Th col="num">#</Th>
                  <Th col="date">Date</Th>
                  <Th col="company">Company</Th>
                  <th>Role</th>
                  <Th col="score">Score</Th>
                  <th>Status</th>
                  <th>Docs</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(app => (
                  <tr key={`${app.num}-${app.company}`}>
                    <td className="col-num">{app.num}</td>
                    <td className="col-date">{app.date}</td>
                    <td className="col-co">{app.company}</td>
                    <td className="col-role">{app.role}</td>
                    <td className="col-score">
                      <ScorePill score={app.score} scoreNum={app.scoreNum} />
                    </td>
                    <td className="col-status">
                      <StatusBadge status={app.status} />
                    </td>
                    <td className="col-docs">
                      <DocLinks
                        pdfLinks={app.pdfLinks}
                        reportPath={app.reportPath}
                        reportLabel={app.reportLabel}
                        htmlSources={app.htmlSources}
                        onRefresh={load}
                      />
                    </td>
                    <td className="col-notes">
                      <div className="note-text" title={app.notes}>{app.notes}</div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
